<!--1) text-decoration

 გამოიყენება ტექსტის გაფორმებისთვის, მაგალითად ხაზის ქვემოთ, ზემოთ ან ხაზგასმის მოსაშორებლად.

მნიშვნელობები:

none – ხაზი არ გამოჩნდეს.

underline – ტექსტის ქვეშ ხაზი.

overline – ტექსტის ზემოთ ხაზი.

line-through – გადახაზული ტექსტი.

მაგალითი:

p {
  text-decoration: underline; /* ტექსტი ქვეშ ხაზით */
}
a {
  text-decoration: none; /* ლინკიდან ხაზის მოშორება */
}

2) text-shadow

 ტექსტს აძლევს ჩრდილს. მისთვის უნდა განვსაზღვროთ:

x-offset (ჰორიზონტალური გადაადგილება)

y-offset (ვერტიკალური გადაადგილება)

blur-radius (გაფანტვა, სირბილე)

color (ფერი)

მაგალითი:

h1 {
  text-shadow: 2px 2px 5px gray; /* მარჯვნივ-ქვემოთ, რბილი ნაცრისფერი ჩრდილი */
}

3) text-align

 ტექსტის განლაგებას არეგულირებს კონტეინერში.

მნიშვნელობები:

left – მარცხნივ გასწორება.

right – მარჯვნივ გასწორება.

center – ცენტრში გასწორება.

justify – მთელ სიგანეზე განაწილება (როგორც წიგნში).

მაგალითი:

p {
  text-align: justify; /* ტექსტი გასწორდება მარცხნივ და მარჯვნივ */
}

4) text-transform

 ტექსტის ასოების სტილის შეცვლა.

მნიშვნელობები:

uppercase – ყველა ასო დიდი.

lowercase – ყველა ასო პატარა.

capitalize – თითოეული სიტყვის პირველი ასო დიდი.

none – ჩვეულებრივი სახით დატოვება.

მაგალითი:


h2 {
  text-transform: uppercase; /* ყველა ასო დიდით */
}
  

5) Sololearn-ის „Styling Text“ (ჩათვლით)

Sololearn-ის Styling Text გაკვეთილში დეტალურად სწავლობ:

როგორ გამოიყენო ტექსტის ფერი (color)

შრიფტის ტიპი (font-family)

შრიფტის ზომა (font-size)

სქელი (font-weight) და დახრილი (font-style)

ტექსტის გასწორება (text-align)

გაფორმებები (text-decoration, text-transform)

ჩრდილი (text-shadow)

ეს ყველაფერი ერთობლივად საშუალებას გაძლევს ტექსტი გახადო უფრო თვალსაჩინო და დიზაინის შესაბამისი.----->
